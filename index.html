<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickTicket - Railway Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="text-center mb-4">
        <h1 class="text-primary fw-bold">🚄 QuickTicket Live</h1>
        <p class="text-muted">Real-Time Train Availability Dashboard</p>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Train Name</th>
                        <th>Route</th>
                        <th>Date</th>
                        <th>Seats Available</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="train-table-body">
                    <tr><td colspan="5" class="text-center">Loading trains from database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://nxbeyjofkazrerzzvlhq.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54YmV5am9ma2F6cmVyenp2bGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTQ4NzIsImV4cCI6MjA4ODgzMDg3Mn0.cpdjhvVasmW5fIiiTn4WCWZ2_FhWGcNm4kugKsszvWs';
    
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchTrains() {
        // FIX: We use 'supabaseClient' here too!
        let { data: trains, error } = await supabaseClient.from('trains').select('*').order('travel_date', { ascending: true });
        
        const tableBody = document.getElementById('train-table-body');
        tableBody.innerHTML = ''; // Clear loading text

        if (error) {
            console.error('Error fetching data:', error);
            tableBody.innerHTML = '<tr><td colspan="5" class="text-danger text-center">Failed to load data. Check console.</td></tr>';
            return;
        }

        // Loop through trains and create HTML rows
        trains.forEach(train => {
            let seatBadge = train.available_seats > 0 
                ? `<span class="badge bg-success">${train.available_seats} Available</span>`
                : `<span class="badge bg-danger">0 - Waitlist Only</span>`;

            let row = `
                <tr>
                    <td class="fw-bold">${train.train_name}</td>
                    <td>${train.source_station} ➔ ${train.destination_station}</td>
                    <td>${train.travel_date}</td>
                    <td>${seatBadge}</td>
                    <td><button class="btn btn-sm btn-primary">Book Now</button></td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    // Run the function when the page loads
    fetchTrains();
</script>

</body>
</html>
